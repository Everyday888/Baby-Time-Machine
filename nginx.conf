server {
    listen 80;
    server_name babytime.us.ci;

    # 强制跳转到 HTTPS（最关键）
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name babytime.us.ci;

    # SSL 证书配置（你后面上传证书后启用）
    ssl_certificate /etc/nginx/ssl/babytime.us.ci_bundle.pem;
    ssl_certificate_key /etc/nginx/ssl/babytime.us.ci.key;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    # 允许上传 20M 图片
    client_max_body_size 20M;

    location / {
        proxy_pass http://flask-app:5000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_connect_timeout 75s;
    }

    location /static/ {
        proxy_pass http://flask-app:5000/static/;
        proxy_cache_valid 200 30d;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    location /images/ {
        proxy_pass http://flask-app:5000/images/;
        proxy_cache_valid 200 7d;
        expires 7d;
    }
}