{% extends "base.html" %}

{% block title %}轻松注册 | 童忆时光册{% endblock %}

{% block content %}
<section class="auth-layout">
  <div class="auth-panel fade-in" data-delay="1">
    <h2>轻松入驻 👋</h2>
    <p class="panel-text">30 秒注册，开启宝贝成长记录</p>

    <form method="post" class="form-stack" id="regForm">
      <input type="hidden" name="family_mode" value="{{ form.get('family_mode', 'create') }}" data-family-mode-input>

      <!-- 称呼 -->
      <div class="field">
        <wa-input label="我的称呼" id="full_name" name="full_name"
          value="{{ form.get('full_name', '') }}" placeholder="比如：宝宝妈妈" required clearable></wa-input>
      </div>

      <!-- 手机号 + 邮箱 -->
      <div class="grid-two">
        <div class="field">
          <wa-input label="手机号" id="phone" name="phone" type="tel"
            value="{{ form.get('phone', '') }}" placeholder="用于登录" required clearable></wa-input>
        </div>
        <div class="field">
          <wa-input label="邮箱（可选）" id="email" name="email" type="email"
            value="{{ form.get('email', '') }}" placeholder="用于找回密码" clearable></wa-input>
        </div>
      </div>

      <!-- 密码 -->
      <div class="field">
        <wa-input label="登录密码" id="password" name="password"
          type="password" password-toggle placeholder="至少 6 位" required></wa-input>
      </div>
      <div class="form-hint" id="pwdTip">密码至少 6 位数字或字母</div>

      <!-- 家庭模式切换 —— 在表单内部 -->
      <div class="family-mode-toggle">
        <wa-button type="button" class="mode-btn" data-family-mode="create"
          variant="{% if form.get('family_mode','create') != 'join' %}brand{% else %}neutral{% endif %}"
          appearance="{% if form.get('family_mode','create') != 'join' %}filled{% else %}outlined{% endif %}">
          🏠 创建新家
        </wa-button>
        <wa-button type="button" class="mode-btn" data-family-mode="join"
          variant="{% if form.get('family_mode','create') == 'join' %}brand{% else %}neutral{% endif %}"
          appearance="{% if form.get('family_mode','create') == 'join' %}filled{% else %}outlined{% endif %}">
          🔑 加入家人
        </wa-button>
      </div>

      <div class="field {% if form.get('family_mode','create') == 'join' %}hidden{% endif %}" data-family-create>
        <wa-input label="给小家起个名字" id="family_name" name="family_name"
          value="{{ form.get('family_name', '') }}" placeholder="比如：小糯米一家" clearable></wa-input>
        <div class="form-hint">建好后自动生成邀请码，发给家人就能加入</div>
      </div>

      <div class="field {% if form.get('family_mode','create') != 'join' %}hidden{% endif %}" data-family-join>
        <wa-input label="家庭邀请码" id="invite_code" name="invite_code"
          value="{{ form.get('invite_code', '') }}" placeholder="输入 6 位专属邀请码" clearable></wa-input>
        <div class="form-hint">一键加入家人的共享空间</div>
      </div>

      <div class="field compact-field">
        <wa-checkbox id="accepted_terms" name="accepted_terms">
          我已阅读并同意 <a href="{{ url_for('terms') }}" target="_blank" style="color:var(--brand-deep);">《用户服务协议》</a>
        </wa-checkbox>
      </div>
      <div class="field compact-field">
        <wa-checkbox id="accepted_privacy" name="accepted_privacy">
          我已阅读并同意 <a href="{{ url_for('privacy') }}" target="_blank" style="color:var(--brand-deep);">《隐私政策》</a>
        </wa-checkbox>
      </div>

      <div class="stack-actions">
        <wa-button type="submit" variant="brand" id="register-submit" disabled>完成入驻</wa-button>
        <a href="{{ url_for('login') }}"><wa-button type="button" appearance="outlined" variant="neutral">已有账号</wa-button></a>
      </div>
    </form>
  </div>

  <div class="info-panel fade-in">
    <span class="eyebrow">加入童忆时光册 👶</span>
    <h2>全家一起，温柔记录长大</h2>
    <div class="meta-list" style="margin-top:1rem;">
      <div class="mini-chip">🏠 建小家 / 进已有家庭</div>
      <div class="mini-chip">📸 存照片、记日常</div>
      <div class="mini-chip">📈 看成长曲线、疫苗提醒</div>
    </div>
  </div>
</section>

<script>
const PHONE_RE = /^1[3-9]\d{9}$/;
const WEAK_PASSWORDS = new Set([
  '000000','111111','222222','333333','444444','555555','666666',
  '777777','888888','999999','123456','654321','123123','321321',
  '112233','998877','1234567','12345678','password','qwerty','abc123',
]);

const phoneEl = document.getElementById('phone');
const phoneHint = document.createElement('div');
phoneHint.className = 'form-hint';
phoneEl?.parentNode?.appendChild(phoneHint);
function checkPhone(val) {
  if (!val) { phoneHint.textContent = ''; return; }
  const ok = PHONE_RE.test(val) && new Set(val.slice(3)).size > 1;
  phoneHint.textContent = ok ? '✓ 格式正确' : '请输入11位手机号（13~19开头，不能全为相同字符）';
  phoneHint.style.color = ok ? 'var(--brand-deep)' : '#d95e5e';
}
phoneEl?.addEventListener('input', e => checkPhone(e.target.value?.trim() || ''));

const pwd = document.getElementById('password');
const tip = document.getElementById('pwdTip');
function checkPwd(val) {
  if (!val) { tip.textContent = '密码至少 6 位数字或字母'; tip.style.color = ''; return; }
  if (val.length < 6) {
    tip.textContent = '密码还差 ' + (6 - val.length) + ' 位'; tip.style.color = '#d95e5e';
  } else if (WEAK_PASSWORDS.has(val) || new Set(val).size === 1) {
    tip.textContent = '密码过于简单，请换一个更安全的'; tip.style.color = '#d95e5e';
  } else {
    tip.textContent = '✓ 密码强度OK'; tip.style.color = 'var(--brand-deep)';
  }
}
pwd?.addEventListener('input', e => checkPwd(e.target.value || ''));

// Both checkboxes must be checked to enable submit
const submitBtn = document.getElementById('register-submit');
function updateSubmitState() {
  const t = document.getElementById('accepted_terms');
  const p = document.getElementById('accepted_privacy');
  const bothChecked = t?.checked && p?.checked;
  if (bothChecked) {
    submitBtn?.removeAttribute('disabled');
  } else {
    submitBtn?.setAttribute('disabled', '');
  }
}
document.getElementById('accepted_terms')?.addEventListener('wa-change', updateSubmitState);
document.getElementById('accepted_privacy')?.addEventListener('wa-change', updateSubmitState);
// Also listen native change events as fallback
document.getElementById('accepted_terms')?.addEventListener('change', updateSubmitState);
document.getElementById('accepted_privacy')?.addEventListener('change', updateSubmitState);
document.querySelectorAll('[data-family-mode]').forEach(btn => {
  btn.addEventListener('click', () => {
    const mode = btn.dataset.familyMode;
    document.querySelectorAll('[data-family-mode]').forEach(b => {
      const active = b.dataset.familyMode === mode;
      b.setAttribute('variant', active ? 'brand' : 'neutral');
      b.setAttribute('appearance', active ? 'filled' : 'outlined');
    });
    const modeInput = document.querySelector('[data-family-mode-input]');
    if (modeInput) modeInput.value = mode;
    document.querySelector('[data-family-create]')?.classList.toggle('hidden', mode !== 'create');
    document.querySelector('[data-family-join]')?.classList.toggle('hidden', mode !== 'join');
  });
});
</script>
{% endblock %}
