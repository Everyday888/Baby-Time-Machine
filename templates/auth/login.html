{% extends "base.html" %}

{% block title %}登录 | 宝贝时光机{% endblock %}

{% block content %}
<section class="auth-layout">
    <div class="info-panel fade-in">
        <span class="eyebrow">欢迎回来👋</span>
        <h2>继续记录宝宝的成长点滴</h2>
        <p class="panel-text">登录后，您可以：</p>
        <div class="meta-list">
            <div class="mini-chip">查看宝宝今天的作息与成长变化</div>
            <div class="mini-chip">进入家庭空间，共享宝宝档案、照片墙、成长曲线</div>
            <div class="mini-chip">接收疫苗提醒，查看成长时间轴</div>
            <div class="mini-chip">与家人实时协作，共同记录宝宝成长</div>
        </div>
    </div>

    <div class="auth-panel fade-in" data-delay="1">
        <h2>登录账号</h2>
        <p class="panel-text">输入手机号（或邮箱）与密码进入宝宝家庭空间。</p>
        <form method="post" class="form-stack">
            <div class="field">
                <wa-input label="手机号或邮箱" id="account" name="account" value="{{ form.get('account', '') }}" placeholder="请输入手机号（支持邮箱）" required clearable></wa-input>
            </div>
            <div class="field">
                <wa-input label="密码" id="password" name="password" type="password" password-toggle placeholder="请输入密码" required></wa-input>
            </div>
            <div class="field compact-field">
                <wa-checkbox name="remember_me">14 天内记住我</wa-checkbox>
            </div>
            <div class="stack-actions">
                <wa-button type="submit" variant="brand">登录</wa-button>
                <a href="{{ url_for('forgot_password') }}"><wa-button type="button" appearance="outlined" variant="neutral">忘记密码</wa-button></a>
            </div>
        </form>
    </div>
</section>
{% endblock %}
