{% extends "base.html" %}

{% block title %}欢迎登录 | 宝贝时光机{% endblock %}

{% block content %}
<style>
/* 移动端强制首屏优先登录框，桌面保持左右美观 */
@media (max-width: 768px) {
  .auth-layout {
    flex-direction: column-reverse !important;
  }
  .info-panel {
    padding: 1rem 1.2rem !important;
    max-height: unset !important;
  }
  .auth-panel {
    padding: 1.5rem 1.2rem !important;
    flex: none !important;
  }
}
</style>

<section class="auth-layout">
    <!-- 移动端：登录框自动跑到最顶部（首屏可见） -->
    <div class="auth-panel fade-in" data-delay="1">
        <h2>欢迎回家 👋</h2>
        <p class="panel-text">输入账号，走进宝贝的成长小窝</p>
        <form method="post" class="form-stack">
            <input type="hidden" name="next" value="{{ next_url or '' }}">
            <div class="field">
                <wa-input label="手机号 / 邮箱" id="account" name="account" 
                          value="{{ form.get('account', '') }}" placeholder="填写你的登录账号" required clearable></wa-input>
            </div>
            <div class="field">
                <wa-input label="登录密码" id="password" name="password" 
                          type="password" password-toggle placeholder="输入密码" required></wa-input>
            </div>
            <div class="field compact-field">
                <wa-checkbox name="remember_me">14天自动登录</wa-checkbox>
            </div>
            <div class="stack-actions">
                <wa-button type="submit" variant="brand">立即进入</wa-button>
                <a href="{{ url_for('forgot_password') }}">
                    <wa-button type="button" appearance="outlined" variant="neutral">找回密码</wa-button>
                </a>
            </div>
        </form>
    </div>

    <!-- 移动端：简介放登录框下方，精简不挡操作 -->
    <div class="info-panel fade-in">
        <span class="eyebrow">暖心小提示</span>
        <h3>在这里，温柔记录每一刻</h3>
        <div class="meta-list">
            <div class="mini-chip">👶 全家共享宝贝档案 & 暖心照片</div>
            <div class="mini-chip">📊 记录作息、身高体重成长曲线</div>
            <div class="mini-chip">💉 疫苗贴心提醒，守护健康</div>
            <div class="mini-chip">👨‍👩‍👧‍👦 家人一起，共同陪伴长大</div>
        </div>
    </div>
</section>
{% endblock %}
