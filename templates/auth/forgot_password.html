{% extends "base.html" %}

{% block title %}找回密码 | 宝贝时光机{% endblock %}

{% block content %}
<section class="auth-layout fade-in">

    <div class="auth-panel fade-in" style="max-width:480px;margin:0 auto;">

        <span class="eyebrow">📱 步骤 1</span>
        <h2 style="margin-bottom:1.2rem;">获取验证码</h2>
        <form method="post" class="form-stack" style="margin-bottom:2rem;">
            <input type="hidden" name="form_action" value="request_code">
            <div class="field">
                <wa-input label="注册手机号" id="request_account" name="account"
                    placeholder="输入注册时的手机号" type="tel" required clearable></wa-input>
            </div>
            <wa-button type="submit" variant="brand">发送验证码</wa-button>
        </form>

        <div class="profile-divider"></div>

        <span class="eyebrow">🔑 步骤 2</span>
        <h2 style="margin:10px 0 1.2rem;">验证并设置新密码</h2>
        <form method="post" class="form-stack">
            <input type="hidden" name="form_action" value="reset_password">
            <div class="field">
                <wa-input label="验证码" id="code" name="code"
                    inputmode="numeric" maxlength="6" placeholder="6 位验证码" required clearable></wa-input>
            </div>
            <div class="field">
                <wa-input label="新密码" id="new_password" name="new_password"
                    type="password" password-toggle placeholder="至少 6 位" required></wa-input>
            </div>
            <div class="field">
                <wa-input label="确认新密码" id="confirm_password" name="confirm_password"
                    type="password" password-toggle placeholder="再次输入" required></wa-input>
            </div>
            <wa-button type="submit" variant="brand">完成密码重置</wa-button>
        </form>

        <div class="stack-actions" style="margin-top:1.2rem;">
            <a href="{{ url_for('login') }}"><wa-button type="button" appearance="outlined" variant="neutral">← 返回登录</wa-button></a>
        </div>

    </div>
</section>
{% endblock %}
