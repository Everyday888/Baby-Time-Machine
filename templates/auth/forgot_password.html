{% extends "base.html" %}

{% block title %}忘记密码 | 宝贝时光机{% endblock %}

{% block content %}
<section class="auth-layout auth-layout-wide">
    <div class="info-panel fade-in">
        <span class="eyebrow">手机号验证码重置</span>
        <p class="panel-text">先填写手机号（也支持邮箱）获取验证码，再输入验证码与新密码完成重置。</p>
    </div>

    <div class="auth-panel fade-in" data-delay="1">
        <h2>步骤 1：获取验证码</h2>
        <form method="post" class="form-stack">
            <input type="hidden" name="form_action" value="request_code">
            <div class="field">
                <wa-input label="注册手机号或邮箱" id="request_account" name="account" placeholder="请输入注册手机号（支持邮箱）" required clearable></wa-input>
            </div>
            <wa-button type="submit" variant="brand">发送验证码</wa-button>
        </form>
    </div>

    <div class="auth-panel fade-in" data-delay="2">
        <h2>步骤 2：验证并重置密码</h2>
        <form method="post" class="form-stack">
            <input type="hidden" name="form_action" value="reset_password">
            <div class="field">
                <wa-input label="注册手机号或邮箱" id="account" name="account" placeholder="再次输入注册手机号（支持邮箱）" required clearable></wa-input>
            </div>
            <div class="field">
                <wa-input label="验证码" id="code" name="code" inputmode="numeric" maxlength="6" placeholder="输入 6 位验证码" required clearable></wa-input>
            </div>
            <div class="field">
                <wa-input label="新密码" id="new_password" name="new_password" type="password" password-toggle placeholder="请输入新密码" required></wa-input>
            </div>
            <div class="field">
                <wa-input label="确认新密码" id="confirm_password" name="confirm_password" type="password" password-toggle placeholder="请再次输入新密码" required></wa-input>
            </div>
            <div class="stack-actions">
                <wa-button type="submit" variant="brand">更新密码</wa-button>
                <a href="{{ url_for('login') }}"><wa-button type="button" appearance="outlined" variant="neutral">返回登录</wa-button></a>
            </div>
        </form>
    </div>
</section>
{% endblock %}
